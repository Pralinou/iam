[lb]
iam_lb ansible_host=127.0.0.1 ansible_port=2200 backend_address=iam_lb

[app_servers]
iam_app1 ansible_host=127.0.0.1 ansible_port=2201 backend_address=iam_app1
iam_app2 ansible_host=127.0.0.1 ansible_port=2202 backend_address=iam_app2
iam_app3 ansible_host=127.0.0.1 ansible_port=2203 backend_address=iam_app3

[all:vars]
ansible_user=root
ansible_password=ansible
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3
