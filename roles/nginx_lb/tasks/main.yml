---
- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: true

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx

- name: Deploy load balancer config
  template:
    src: nginx_lb.conf.j2
    dest: /etc/nginx/conf.d/{{ app_name }}_lb.conf
    owner: root
    group: root
    mode: "0644"
    validate: nginx -t -c /etc/nginx/nginx.conf
  notify: reload nginx

- name: Ensure Nginx is running
  service:
    name: nginx
    state: started
    enabled: true
