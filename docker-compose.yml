services:

  postgres:
    image: postgres:15-alpine
    container_name: iam_postgres
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iam_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak"]
      interval: 10s
      timeout: 5s
      retries: 5

  lb_1:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lb_1
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://iam_postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iam_network

  lb_2:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lb_2
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://iam_postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iam_network

  lb_3:
    image: quay.io/keycloak/keycloak:24.0
    container_name: lb_3
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://iam_postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak_password
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HTTP_ENABLED: "true"
      KC_PROXY: edge
      KC_HOSTNAME_STRICT: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - iam_network

  openldap:
    image: osixia/openldap:1.5.0
    container_name: iam_ldap
    environment:
      LDAP_ORGANISATION: "IAM Organisation"
      LDAP_DOMAIN: "iam.local"
      LDAP_ADMIN_PASSWORD: "ldap_admin_password"
      LDAP_CONFIG_PASSWORD: "ldap_config_password"
      LDAP_READONLY_USER: "true"
      LDAP_READONLY_USER_USERNAME: "readonly"
      LDAP_READONLY_USER_PASSWORD: "ldap_readonly_password"
    volumes:
      - ldap_data:/var/lib/ldap
      - ldap_config:/etc/ldap/slapd.d
    ports:
      - "389:389"
    networks:
      - iam_network

  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: iam_ldap_admin
    environment:
      PHPLDAPADMIN_LDAP_HOSTS: iam_ldap
      PHPLDAPADMIN_HTTPS: "false"
    ports:
      - "8081:80"
    depends_on:
      - openldap
    networks:
      - iam_network

  nginx:
    image: nginx:alpine
    container_name: iam_lb
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - lb_1
      - lb_2
      - lb_3
    networks:
      - iam_network

volumes:
  postgres_data:
  ldap_data:
  ldap_config:

networks:
  iam_network:
    driver: bridge
