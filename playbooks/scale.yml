---
# Usage: ansible-playbook playbooks/scale.yml -e "target_hosts=app4,app5"
# Ajoute de nouveaux noeuds app et met à jour le LB automatiquement
- name: Scale up - deploy app on new hosts
  hosts: "{{ target_hosts | default('app_servers') }}"
  become: true
  roles:
    - docker
    - app

- name: Reconfigure load balancer with new hosts
  hosts: lb
  become: true
  roles:
    - nginx_lb
